<svg width="300" height="250" viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Large eye -->
  <g transform="translate(80, 80)">
    <path d="M 0 -40 Q 60 0 0 40 Q -60 0 0 -40" fill="none" stroke="#00897B" stroke-width="4"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#1e3a5f" stroke-width="3"/>
    <circle cx="0" cy="0" r="15" fill="#1e3a5f"/>
    <circle cx="4" cy="-4" r="5" fill="white"/>
  </g>
  <!-- DNA double helix -->
  <g transform="translate(160, 40)">
    <path d="M 0 10 Q 15 20 0 30 Q -15 40 0 50 Q 15 60 0 70 Q -15 80 0 90 Q 15 100 0 110" 
          fill="none" stroke="#1e5a96" stroke-width="3"/>
    <path d="M 0 10 Q -15 20 0 30 Q 15 40 0 50 Q -15 60 0 70 Q 15 80 0 90 Q -15 100 0 110" 
          fill="none" stroke="#9C27B0" stroke-width="3"/>
    <!-- Connection rungs -->
    <line x1="-8" y1="30" x2="8" y2="30" stroke="#4CAF50" stroke-width="2"/>
    <line x1="-8" y1="70" x2="8" y2="70" stroke="#4CAF50" stroke-width="2"/>
  </g>
</svg>
